name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Build Debug APK
        run: gradle :androidApp:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KakkamvellyTemple-debug-${{ github.run_number }}
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: KakkamvellyTemple-debug-${{ github.run_number }}
          path: apk/

      - name: Rename APK
        run: mv apk/*.apk apk/kakkamvelly-temple.apk

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "കക്കംവെള്ളി ക്ഷേത്രം — Latest Build"
          body: |
            ## Download
            Tap **kakkamvelly-temple.apk** below to download.

            **Install steps:**
            1. Download the APK
            2. Allow "Install unknown apps" in Android settings
            3. Tap the APK to install

            Build #${{ github.run_number }}
          files: apk/kakkamvelly-temple.apk
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
