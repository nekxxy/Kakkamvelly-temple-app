name: Build & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Signed Release APK + AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Build Signed Release APK
        run: gradle :androidApp:assembleRelease
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/kakkamvelly-release.jks
          SIGNING_STORE_PASSWORD: "kvt@2025#temple"
          SIGNING_KEY_ALIAS: "kakkamvelly"
          SIGNING_KEY_PASSWORD: "kvt@2025#temple"

      - name: Build Signed Release AAB
        run: gradle :androidApp:bundleRelease
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/kakkamvelly-release.jks
          SIGNING_STORE_PASSWORD: "kvt@2025#temple"
          SIGNING_KEY_ALIAS: "kakkamvelly"
          SIGNING_KEY_PASSWORD: "kvt@2025#temple"

      - name: Rename outputs
        run: |
          mv androidApp/build/outputs/apk/release/androidApp-release.apk kakkamvelly-temple.apk
          mv androidApp/build/outputs/bundle/release/androidApp-release.aab kakkamvelly-temple.aab

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "v1.0.${{ github.run_number }} — കക്കംവെള്ളി ക്ഷേത്രം"
          body: |
            ## v1.0.${{ github.run_number }}

            | File | Use |
            |------|-----|
            | `kakkamvelly-temple.apk` | Install on Android |
            | `kakkamvelly-temple.aab` | Google Play Store |

            **⚠️ First-time install:** If you have an older APK installed, uninstall it first (one-time only — future updates will work automatically).
          files: |
            kakkamvelly-temple.apk
            kakkamvelly-temple.aab
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
